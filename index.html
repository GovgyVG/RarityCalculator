<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Rarity Calculator</title>
<link rel="icon" type="image/png" href="others/icon.webp">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #13121a; color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 16px; min-height: 100vh; padding: 2rem 1.5rem;
    transition: background 0.3s;
  }
  .container { max-width: 1140px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .title { font-size: 26px; font-weight: 700; color: #f0f0ff; letter-spacing: -0.3px; }
  
  .reset-btn {
    font-size: 13px; font-weight: 500; padding: 7px 20px; border-radius: 999px;
    border: 1.5px solid #4a4070; background: transparent; color: #b0a8e0;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .reset-btn:hover { background: #1e1a2e; border-color: #7060b0; color: #d0c8f0; }
  #search {
    width: 100%; padding: 14px 18px; background: #1c1a2a;
    border: 1.5px solid #2e2a44; border-radius: 12px; color: #e8e8f0;
    font-size: 15px; font-family: inherit; margin-bottom: 1rem; outline: none; transition: border-color 0.15s;
  }
  #search::placeholder { color: #5a5570; }
  #search:focus { border-color: #5a50a0; }
  
  #slime-grid {
    background: #1a1828; border: 1.5px solid #2a2540; border-radius: 14px;
    padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px; max-height: 340px; overflow-y: auto; margin-bottom: 1.5rem;
  }
  #slime-grid::-webkit-scrollbar { width: 6px; }
  #slime-grid::-webkit-scrollbar-track { background: transparent; }
  #slime-grid::-webkit-scrollbar-thumb { background: #3a3560; border-radius: 3px; }
  
  .slime-card {
    padding: 12px 8px; border-radius: 10px; border: 1.5px solid #2a2540;
    background: #201e30; cursor: pointer; text-align: center; transition: all 0.12s; font-family: inherit;
  }
  .slime-card:hover { background: #272440; border-color: #4a4070; }
  .slime-card.active { border-color: #7060c0; background: #25204a; }
  
  .slime-img-wrapper {
    width: 60px; height: 60px; margin: 0 auto 12px auto; 
    display: flex; align-items: flex-end; justify-content: center;
    position: relative; border-radius: 8px; background: rgba(0,0,0,0.1); 
  }
  .slime-img {
    height: auto; max-height: none; position: absolute; object-fit: contain;
    pointer-events: none; z-index: 2; transition: all 0.2s ease;
  }
  .no-img {
    background: #2a2540; font-size: 10px; color: #5a5570; font-weight: bold;
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; position: relative;
  }

  #res-slime-wrapper {
    width: 60px; height: 60px; border-radius: 8px; margin: 0;
    position: relative; display: flex; align-items: flex-end; justify-content: center;
    background: #1a1828; border: 1.5px dashed #3a3560; transition: all 0.2s;
  }
  #res-slime-wrapper.has-slime {
    background: rgba(0,0,0,0.1); border: 1.5px solid transparent;
  }
  #res-placeholder {
    color: #3a3550; font-size: 26px; font-weight: 800; position: absolute; 
    top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
  }
  #res-slime-wrapper.has-slime #res-placeholder { display: none; }
  #res-slime-img { display: none; }
  #res-slime-wrapper.has-slime #res-slime-img { display: block; }

  .mutation-big-active #res-slime-wrapper,
  .mutation-big-active #slime-grid .slime-img-wrapper {
    border-radius: 0 !important; border: 3px solid #0a0a0a !important; overflow: hidden !important; background: #201e30;
  }
  .mutation-big-active #res-slime-wrapper .slime-img,
  .mutation-big-active #slime-grid .slime-img {
    position: relative !important; width: 100% !important; height: 100% !important; bottom: 0 !important; object-fit: cover !important; transform: scale(1.65) !important; 
  }

  .mutation-huge-active #res-slime-wrapper,
  .mutation-huge-active #slime-grid .slime-img-wrapper {
    border-radius: 0 !important; border: 3px solid #0a0a0a !important; overflow: hidden !important; background: #201e30;
  }
  .mutation-huge-active #res-slime-wrapper .slime-img,
  .mutation-huge-active #slime-grid .slime-img {
    position: relative !important; width: 100% !important; height: 100% !important; bottom: 0 !important; object-fit: cover !important; transform: scale(2.3) !important; 
  }
  
  .mutation-inverted-active #res-slime-wrapper .slime-img,
  .mutation-inverted-active #slime-grid .slime-img { filter: invert(100%); }

  .shiny-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('others/shiny.png'); background-size: cover; background-position: center;
    pointer-events: none; z-index: 5; opacity: 0.9; display: none;
  }
  
  .mutation-shiny-active #res-slime-wrapper .shiny-overlay,
  .mutation-shiny-active #slime-grid .shiny-overlay { display: block; }

  #favorites-wrapper { margin-bottom: 1.5rem; display: none; }
  .fav-container { display: flex; flex-wrap: wrap; gap: 10px; }
  
  .fav-card {
    background: #1a1828; border: 1.5px solid #3a3560; padding: 8px 12px; border-radius: 10px;
    display: flex; align-items: center; gap: 12px; cursor: grab; transition: 0.2s; 
    position: relative; padding-right: 40px; min-width: 200px;
  }
  .fav-card:active { cursor: grabbing; }
  .fav-card:hover { border-color: #7060c0; background: #201e30; }
  .fav-card.dragging { opacity: 0.4; transform: scale(0.95); }
  .fav-card.drag-over { border-color: #d4af37; background: #272440; }
  .fav-card > div, .fav-card > img { pointer-events: none; }
  .fav-card .fav-del { pointer-events: auto; }
  
  .fav-img-box {
    width: 36px; height: 36px; border-radius: 8px; position: relative;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .fav-img { 
    width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); 
    transition: all 0.2s; position: relative; z-index: 2;
  }
  
  .fav-img.fav-inverted { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)) invert(100%); }
  .fav-box-big { border-radius: 0; border: 2px solid #0a0a0a; background: #201e30; overflow: hidden; }
  .fav-box-big .fav-img { object-fit: cover; transform: scale(1.65); filter: none; }
  .fav-box-big .fav-img.fav-inverted { filter: invert(100%); }
  .fav-box-huge { border-radius: 0; border: 2px solid #0a0a0a; background: #201e30; overflow: hidden; }
  .fav-box-huge .fav-img { object-fit: cover; transform: scale(2.3); filter: none; }
  .fav-box-huge .fav-img.fav-inverted { filter: invert(100%); }
  .fav-shiny .shiny-overlay { display: block; }

  .fav-info { display: flex; flex-direction: column; gap: 2px; }
  .fav-name { font-size: 13px; font-weight: 600; color: #e8e8f0; }
  .fav-details { font-size: 11px; color: #a0a0c0; }
  .fav-del {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: transparent; border: none; color: #5a5570; cursor: pointer; 
    font-size: 18px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: 0.2s;
  }
  .fav-del:hover { background: #e24b4a20; color: #E24B4A; }
  .fav-btn {
    padding: 6px 14px; border-radius: 8px; border: 1.5px solid #3a3560;
    background: #1a1828; color: #c0b8e8; font-size: 12px; cursor: pointer;
    transition: all 0.15s; font-family: inherit; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .fav-btn:hover { background: #222040; border-color: #5a50a0; }
  .fav-btn.is-fav { border-color: #d4af37; color: #d4af37; background: rgba(212, 175, 55, 0.1); }
  .fav-btn.is-fav:hover { background: rgba(212, 175, 55, 0.2); }

  .stat-group { display: flex; align-items: center; gap: 12px; }
  .slime-name { font-size: 13px; font-weight: 600; color: #e8e8f0; display: block; margin-bottom: 4px; }
  
  .slime-tier, .fav-tier {
    font-size: 13px; display: block; font-weight: 800; margin-top: 2px; letter-spacing: 0.5px;
    text-shadow: 
      -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
      0 -1px 0 #000, 0 1px 0 #000, -1px 0 0 #000, 1px 0 0 #000,
      0px 2px 4px rgba(0,0,0,0.8);
  }
  
  .section-label {
    font-size: 12px; font-weight: 700; color: #7060c0; letter-spacing: 0.1em; text-transform: uppercase; margin: 0 0 0.75rem; display: flex; align-items: center; gap: 8px;
  }
  
  .level-input {
    width: 90px; padding: 6px 10px; background: #13121a; border: 1.5px solid #3a3560; border-radius: 8px;
    color: #e8e8f0; font-size: 14px; font-family: inherit; text-align: center; outline: none; transition: border-color 0.15s;
  }
  .level-input:focus { border-color: #7060c0; }
  
  #mutation-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .mut-btn {
    padding: 9px 22px; border-radius: 999px; border: 1.5px solid #3a3560; background: #1a1828; color: #c0b8e8; font-size: 14px; cursor: pointer; transition: all 0.12s; font-family: inherit; font-weight: 500;
  }
  .mut-btn:hover { background: #222040; border-color: #5a50a0; }
  .mut-btn.active { background: #2a2050; border-color: #8070d0; color: #d0c8ff; }
  .mut-btn.disabled-btn { opacity: 0.3; cursor: not-allowed; }
  #mut-warning { font-size: 12px; color: #E24B4A; min-height: 16px; margin: 0 0 1.25rem; }
  
  .result-box { background: #1a1828; border: 1.5px solid #2a2540; border-radius: 14px; padding: 1.5rem 1.75rem; margin-top: 1.25rem; position: relative; }
  .result-stats { display: flex; gap: 2.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
  .stat-label { font-size: 11px; font-weight: 700; color: #5a5580; margin: 0 0 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-value { font-size: 16px; font-weight: 600; color: #e8e8f0; margin: 0; display: flex; align-items: center; gap: 8px;}
  .divider { border: none; border-top: 1px solid #2a2540; margin: 0 0 1.25rem; }
  .final-label { font-size: 11px; font-weight: 700; color: #5a5580; margin: 0; text-transform: uppercase; letter-spacing: 0.08em; }

  .food-trigger-btn {
    background: #2a2540; border: none; color: #e8e8f0; font-size: 13px; font-weight: 700;
    padding: 3px 8px; border-radius: 6px; cursor: pointer; transition: 0.2s;
  }
  .food-trigger-btn:hover { background: #4a4070; color: #fff; }
  
  #rarity-value { 
    font-size: 36px; font-weight: 900; color: #e8e8f0; margin: 0 0 4px; min-height: 44px; letter-spacing: 0.5px;
    text-shadow: 
      -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
      0 -2px 0 #000, 0 2px 0 #000, -2px 0 0 #000, 2px 0 0 #000,
      0px 4px 6px rgba(0,0,0,0.8);
  }
  #rarity-indicator { width: 40px; height: 3px; background: #4a4070; border-radius: 2px; margin-bottom: 10px; transition: background 0.3s; }
  
  #rarity-label { 
    font-size: 15px; color: #5a5580; margin: 0; font-weight: 800; letter-spacing: 0.5px;
    text-shadow: 
      -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000,
      0 -1.5px 0 #000, 0 1.5px 0 #000, -1.5px 0 0 #000, 1.5px 0 0 #000,
      0px 3px 5px rgba(0,0,0,0.8);
  }
  
  .stats-panel { flex: 1; min-width: 220px; background: #13121a; border-radius: 10px; padding: 1rem 1.25rem; border: 1px solid #2a2540; }
  .stats-grid { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  #combo-hint { display: none; background: #1e1c2e; border: 1px solid #3a3560; border-radius: 10px; padding: 0.75rem 1.1rem; margin-top: 1rem; }
  .combo-sub { font-size: 11px; color: #5a5580; margin: 0 0 3px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .combo-name-text { font-size: 14px; font-weight: 600; margin: 0; color: #c0b8e8; }

  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7); z-index: 100;
    display: none; align-items: center; justify-content: center;
    padding: 1rem; backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    background: #1a1828; border: 1px solid #3a3560; border-radius: 14px;
    padding: 2rem; max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto;
    position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .modal-content::-webkit-scrollbar { width: 6px; }
  .modal-content::-webkit-scrollbar-track { background: transparent; }
  .modal-content::-webkit-scrollbar-thumb { background: #3a3560; border-radius: 3px; }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem; background: transparent;
    border: none; color: #5a5570; font-size: 20px; cursor: pointer; 
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; transition: 0.2s;
  }
  .modal-close:hover { background: #2a2540; color: #e8e8f0; }

  .food-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 1.5rem;
  }
  .food-card {
    background: #13121a; border: 1px solid #3a3560; border-radius: 12px; padding: 12px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .food-img { width: 48px; height: 48px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));}
  .food-name { font-size: 12px; font-weight: 600; color: #c0b8e8; margin-bottom: 4px; }
  .food-qty { font-size: 16px; font-weight: 800; color: #a6ff8b; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <span class="title">Rarity Calculator</span>
    </div>
    <div class="header-right">
      <button class="reset-btn" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <input type="text" id="search" placeholder="Search slimes..." />
  <div id="slime-grid"></div>

  <div id="favorites-wrapper">
    <p class="section-label">⭐ Favorites</p>
    <div class="fav-container" id="favorites-container"></div>
  </div>

  <p class="section-label">Mutations</p>
  <div id="mutation-buttons"></div>
  <p id="mut-warning"></p>

  <div class="result-box">
    <div class="result-stats">
      <div class="stat-group">
        <div class="slime-img-wrapper" id="res-slime-wrapper">
          <span id="res-placeholder">?</span>
          <img id="res-slime-img" src="" alt="" class="slime-img">
          <div class="shiny-overlay"></div>
        </div>
        <div><p class="stat-label">Slime</p><p class="stat-value" id="sel-slime">—</p></div>
      </div>
      <div><p class="stat-label">Base Rarity</p><p class="stat-value" id="base-rarity">—</p></div>
      <div><p class="stat-label">Mutations</p><p class="stat-value" id="active-label">None</p></div>
      
      <div style="margin-left: auto; display: flex; gap: 2.5rem; align-items: center; flex-wrap: wrap;">
        <div>
          <p class="stat-label">Total Exp</p>
          <p class="stat-value" id="upgrade-cost">—</p>
        </div>
        <div style="display: flex; flex-direction: column; gap: 4px;">
          <p class="stat-label">Level</p>
          <input type="number" id="level-num" class="level-input" min="1" max="9999" value="1" oninput="syncLevel()">
        </div>
      </div>
      
    </div>
    <hr class="divider">
    <div style="display:flex;gap:2rem;flex-wrap:wrap;align-items:flex-start;">
      <div style="flex:1;min-width:180px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 6px;">
          <p class="final-label">Final Rarity</p>
          <button id="fav-toggle-btn" class="fav-btn" style="display: none;" onclick="toggleFavorite()">☆ Save</button>
        </div>
        <p id="rarity-value">—</p>
        <div id="rarity-indicator"></div>
        <p id="rarity-label">Select a slime to begin</p>
      </div>
      <div class="stats-panel">
        <p class="final-label" style="margin-bottom:0.75rem;">Stats at this level &amp; mutations</p>
        <div class="stats-grid">
          <div><p class="stat-label">💪 ATK</p><p class="stat-value" id="stat-atk">—</p></div>
          <div><p class="stat-label">❤️ HP</p><p class="stat-value" id="stat-hp">—</p></div>
          <div><p class="stat-label">Stat multi</p><p class="stat-value" id="stat-multi">x1</p></div>
        </div>
      </div>
    </div>
    <div id="combo-hint">
      <p class="combo-sub">Matched preset combo</p>
      <p class="combo-name-text" id="combo-name"></p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="food-modal" onclick="closeModal(event, 'food-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="toggleFoodModal()">✕</button>
    <h2 class="title" id="food-modal-title" style="font-size: 22px;">Food Needed 🍔</h2>
    <div id="food-grid" class="food-grid"></div>
  </div>
</div>

<script>
const slimes = [
  {name:"Goopy", img:"smiles/Goopy.webp", base:3, tier:"Basic", color:"#aaaaaa", atk:4, hp:10, imgSize:"130%", imgBottom:"-10px"},
  {name:"Sunset", img:"smiles/Sunset.webp", base:5, tier:"Basic", color:"#aaaaaa", atk:5, hp:15, imgSize:"130%", imgBottom:"-10px"},
  {name:"Fin", img:"smiles/Fin.webp", base:8, tier:"Common", color:"#a6ff8b", atk:6, hp:20, imgSize:"130%", imgBottom:"-10px"},
  {name:"Leafy", img:"smiles/Leafy.webp", base:11, tier:"Common", color:"#a6ff8b", atk:7, hp:22, imgSize:"130%", imgBottom:"-10px"},
  {name:"Meow", img:"smiles/Meow.webp", base:35, tier:"Uncommon", color:"#98f0be", atk:8, hp:27, imgSize:"130%", imgBottom:"-10px"},
  {name:"Glo", img:"smiles/Glo.webp", base:57, tier:"Uncommon", color:"#98f0be", atk:10, hp:30, imgSize:"130%", imgBottom:"-10px"},
  {name:"Buggy", img:"smiles/Buggy.webp", base:103, tier:"Rare", color:"#85d0fb", atk:13, hp:36, imgSize:"130%", imgBottom:"-10px"},
  {name:"Scorchy", img:"smiles/Scorchy.webp", base:160, tier:"Rare", color:"#85d0fb", atk:15, hp:43, imgSize:"130%", imgBottom:"-5px"},
  {name:"Brutis", img:"smiles/Brutis.webp", base:263, tier:"Rare", color:"#85d0fb", atk:18, hp:50, imgSize:"130%", imgBottom:"-10px"},
  {name:"Frankenslime", img:"smiles/Frankenslime.webp", base:415, tier:"Rare", color:"#85d0fb", atk:20, hp:60, imgSize:"130%", imgBottom:"-10px"},
  {name:"Orca", img:"smiles/Orca.webp", base:719, tier:"Epic", color:"#ba85ff", atk:25, hp:72, imgSize:"170%", imgBottom:"-25px"},
  {name:"Spike", img:"smiles/Spike.webp", base:1260, tier:"Epic", color:"#ba85ff", atk:29, hp:88, imgSize:"140%", imgBottom:"-10px"},
  {name:"Axolotl", img:"smiles/Axolotl.webp", base:2390, tier:"Epic", color:"#ba85ff", atk:36, hp:105, imgSize:"160%", imgBottom:"-20px"},
  {name:"Spidey", img:"smiles/Spidey.webp", base:4270, tier:"Legendary", color:"#ffac7b", atk:43, hp:121, imgSize:"155%", imgBottom:"-15px"},
  {name:"Mushy", img:"smiles/Mushy.webp", base:7770, tier:"Legendary", color:"#ffac7b", atk:50, hp:148, imgSize:"160%", imgBottom:"-20px"},
  {name:"Rocky", img:"smiles/Rocky.webp", base:13900, tier:"Legendary", color:"#ffac7b", atk:58, hp:176, imgSize:"130%", imgBottom:"-10px"},
  {name:"Lucky", img:"smiles/Lucky.webp", base:21500, tier:"Mythic", color:"#ff87bf", atk:67, hp:200, imgSize:"130%", imgBottom:"-5px"},
  {name:"Stump", img:"smiles/Stump.webp", base:35900, tier:"Mythic", color:"#ff87bf", atk:75, hp:232, imgSize:"130%", imgBottom:"-5px"},
  {name:"Pondy", img:"smiles/Pondy.webp", base:53800, tier:"Mythic", color:"#ff87bf", atk:85, hp:256, imgSize:"130%", imgBottom:"-5px"},
  {name:"Crafty", img:"smiles/Crafty.webp", base:57400, tier:"Mythic", color:"#ff87bf", atk:90, hp:270, imgSize:"140%", imgBottom:"-10px"},

function getRarityColor(val) {
  if (val < 8) return "#aaaaaa"; 
  if (val < 35) return "#a6ff8b"; 
  if (val < 100) return "#98f0be"; 
  if (val < 500) return "#85d0fb"; 
  if (val < 2500) return "#ba85ff"; 
  if (val < 15000) return "#ffac7b"; 
  if (val < 60000) return "#ff87bf"; 
  if (val < 500000) return "#fee989"; 
  if (val < 4000000) return "#5dfbcb"; 
  if (val < 25000000) return "#e084ff"; 
  if (val < 300000000) return "#aadeff"; 
  if (val < 4000000000) return "#ff4a4a"; 
  if (val < 50000000000) return "#b6e8ff"; 
  if (val < 500000000000) return "#4189e0"; 
  if (val < 7000000000000) return "#db88d3"; 
  if (val < 75000000000000) return "#d4af37"; 
  if (val < 750000000000000) return "#b1b7f1"; 
  if (val < 10000000000000000) return "#ba85ff"; 
  if (val < 100000000000000000) return "#5dfbcb"; 
  return "#a850e0"; 
}

function fmtNum(n) {
  if (n >= 1e21) return +(n/1e21).toFixed(2) + 'Sx'
  if (n >= 1e18) return +(n/1e18).toFixed(2) + 'Qn';
  if (n >= 1e15) return +(n/1e15).toFixed(2) + 'Qd';
  if (n >= 1e12) return +(n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return +(n/1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return +(n/1e6).toFixed(2) + 'M';
  if (n >= 1e3)  return +(n/1e3).toFixed(2) + 'K';
  return Math.round(n).toString();
}

function fmt(n) { return '1/' + fmtNum(n); }

function renderGrid(filter) {
  const grid = document.getElementById('slime-grid');
  grid.innerHTML = '';
  const q = (filter||'').toLowerCase();
  
  const sorted = [...selectedMuts].sort();
  let mutMult = 1;
  if (sorted.length > 0) {
    const presetMatch = presets.find(p => { const ps=[...p.ids].sort(); return ps.length===sorted.length&&ps.every((v,i)=>v===sorted[i]); });
    mutMult = presetMatch ? presetMatch.mult : sorted.reduce((acc,id) => { const m=mutations.find(x=>x.id===id); return acc*(m?m.mult:1); },1);
  }
  
  slimes.filter(s => s.name.toLowerCase().includes(q)).forEach(s => {
    const card = document.createElement('div');
    card.className = 'slime-card' + (selectedSlime === s.name ? ' active' : '');
    
    const imgHtml = `
      <div class="slime-img-wrapper">
        <img src="${s.img}" class="slime-img" style="width: ${s.imgSize}; bottom: ${s.imgBottom};" alt="${s.name}" onerror="this.parentElement.outerHTML='<div class=\\'slime-img-wrapper no-img\\'>No Img</div>'">
        <div class="shiny-overlay"></div>
      </div>`;
    
    const currentRarity = s.base * mutMult;
    const color = getRarityColor(currentRarity);
    
    card.innerHTML = `${imgHtml}<span class="slime-name">${s.name}</span><span class="slime-tier" style="color:${color};">${fmt(currentRarity)}</span>`;
    
    card.onclick = () => {
      selectedSlime = s.name;
      document.querySelectorAll('.slime-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      update();
    };
    grid.appendChild(card);
  });
}

const mutBtns = {};
mutations.forEach(m => {
  const btn = document.createElement('button');
  btn.className = 'mut-btn'; btn.textContent = m.label;
  btn.onclick = () => {
    if (btn.classList.contains('disabled-btn')) return;
    if (selectedMuts.has(m.id)) { selectedMuts.delete(m.id); btn.classList.remove('active'); }
    else { selectedMuts.add(m.id); btn.classList.add('active'); }
    const excl = exclusions[m.id];
    if (excl && selectedMuts.has(m.id)) { selectedMuts.delete(excl); mutBtns[excl].classList.remove('active'); }
    refreshMutButtons(); 
    update();
    renderGrid(document.getElementById('search').value);
  };
  mutBtns[m.id] = btn;
  document.getElementById('mutation-buttons').appendChild(btn);
});

function refreshMutButtons() {
  mutations.forEach(m => {
    const btn = mutBtns[m.id];
    const blockedBy = exclusions[m.id];
    if (blockedBy && selectedMuts.has(blockedBy)) btn.classList.add('disabled-btn');
    else btn.classList.remove('disabled-btn');
  });
}

function resetAll() {
  selectedSlime = null; selectedMuts.clear(); currentLevel = 1;
  document.getElementById('search').value = '';
  document.getElementById('level-num').value = 1;
  Object.values(mutBtns).forEach(b => b.classList.remove('active','disabled-btn'));
  document.getElementById('mut-warning').textContent = '';
  document.body.classList.remove('mutation-big-active', 'mutation-huge-active', 'mutation-inverted-active', 'mutation-shiny-active');
  renderGrid(); update();
}

document.getElementById('search').addEventListener('input', e => renderGrid(e.target.value));

function getFavId() {
  if (!selectedSlime) return null;
  const sortedMuts = [...selectedMuts].sort().join(',');
  return `${selectedSlime}_lvl${currentLevel}_muts:${sortedMuts}`;
}

function isCurrentFavorite() {
  const id = getFavId();
  return favorites.some(f => f.id === id);
}

function toggleFavorite() {
  if (!selectedSlime) return;
  const id = getFavId();
  
  if (isCurrentFavorite()) {
    favorites = favorites.filter(f => f.id !== id);
  } else {
    favorites.push({
      id: id,
      slime: selectedSlime,
      level: currentLevel,
      mutations: [...selectedMuts]
    });
  }
  localStorage.setItem('slimeFavorites', JSON.stringify(favorites));
  update();
  renderFavorites();
}

function deleteFavorite(id) {
  favorites = favorites.filter(f => f.id !== id);
  localStorage.setItem('slimeFavorites', JSON.stringify(favorites));
  renderFavorites();
  update();
}

function loadFavorite(fav) {
  selectedSlime = fav.slime;
  currentLevel = fav.level;
  document.getElementById('level-num').value = fav.level;
  
  selectedMuts.clear();
  fav.mutations.forEach(m => selectedMuts.add(m));
  
  Object.values(mutBtns).forEach(btn => btn.classList.remove('active'));
  fav.mutations.forEach(m => {
    if(mutBtns[m]) mutBtns[m].classList.add('active');
  });
  
  document.getElementById('search').value = ''; 
  renderGrid(); 
  refreshMutButtons();
  update();
  
  document.querySelector('.result-box').scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

function renderFavorites() {
  const wrapper = document.getElementById('favorites-wrapper');
  const container = document.getElementById('favorites-container');
  
  if (favorites.length === 0) {
    wrapper.style.display = 'none';
    return;
  }
  
  wrapper.style.display = 'block';
  container.innerHTML = '';
  
  favorites.forEach((fav, index) => {
    const slimeObj = slimes.find(s => s.name === fav.slime);
    if (!slimeObj) return;

    const card = document.createElement('div');
    card.className = 'fav-card';
    card.draggable = true;
    
    card.addEventListener('dragstart', (e) => {
      draggedIndex = index;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    
    card.addEventListener('dragover', (e) => { e.preventDefault(); });
    
    card.addEventListener('dragenter', (e) => {
      e.preventDefault();
      if (draggedIndex !== index) card.classList.add('drag-over');
    });
    
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (draggedIndex !== null && draggedIndex !== index) {
        const draggedItem = favorites.splice(draggedIndex, 1)[0];
        favorites.splice(index, 0, draggedItem);
        localStorage.setItem('slimeFavorites', JSON.stringify(favorites));
        renderFavorites();
      }
    });
    
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.fav-card').forEach(c => c.classList.remove('drag-over'));
      draggedIndex = null;
    });
    
    card.onclick = (e) => {
      if (e.target.closest('.fav-del')) return;
      loadFavorite(fav);
    };

    const mutText = fav.mutations.length > 0 ? fav.mutations.join(' + ') : 'No mutations';
    
    const sorted = [...fav.mutations].sort();
    
    let favMutMult = 1, favPresetMatch = null;
    if (sorted.length > 0) {
      favPresetMatch = presets.find(p => { const ps=[...p.ids].sort(); return ps.length===sorted.length&&ps.every((v,i)=>v===sorted[i]); });
      favMutMult = favPresetMatch ? favPresetMatch.mult : sorted.reduce((acc,id) => { const m=mutations.find(x=>x.id===id); return acc*(m?m.mult:1); },1);
    }
    const finalFavRarity = slimeObj.base * favMutMult;
    const favColor = getRarityColor(finalFavRarity);

    const statKey = sorted.join('+');
    const statMult = statMultipliers[statKey] ?? 1;
    
    const atk = Math.round((slimeObj.atk / 10) * (9 + fav.level) * statMult);
    const hp  = Math.round((slimeObj.hp / 10) * (9 + fav.level) * statMult);
    
    const hasInverted = fav.mutations.includes('inverted');
    const hasBig = fav.mutations.includes('big');
    const hasHuge = fav.mutations.includes('huge');
    const hasShiny = fav.mutations.includes('shiny');
    
    const imgClass = hasInverted ? 'fav-img fav-inverted' : 'fav-img';
    
    let boxClass = 'fav-img-box';
    if (hasHuge) boxClass += ' fav-box-huge';
    else if (hasBig) boxClass += ' fav-box-big';
    if (hasShiny) boxClass += ' fav-shiny';
    
    card.innerHTML = `
      <div class="${boxClass}">
        <img src="${slimeObj.img}" class="${imgClass}" alt="${fav.slime}">
        <div class="shiny-overlay"></div>
      </div>
      <div class="fav-info">
        <span class="fav-name">
          ${fav.slime} 
          <span style="color:#7060c0; font-size:11px;">Lv.${fav.level}</span>
          <span style="color:#a0a0c0; font-size:10px; font-weight:500; margin-left:4px;">💪 ${fmtNum(atk)} &nbsp;❤️ ${fmtNum(hp)}</span>
        </span>
        <span class="fav-details">${mutText}</span>
        <span class="fav-tier" style="color: ${favColor};">${fmt(finalFavRarity)}</span>
      </div>
      <button class="fav-del" title="Remove" onclick="deleteFavorite('${fav.id}')">✕</button>
    `;
    container.appendChild(card);
  });
}

function renderFoodModal(totalHp) {
  const grid = document.getElementById('food-grid');
  const modalTitle = document.getElementById('food-modal-title');
  grid.innerHTML = '';

  if (totalHp === 0) {
    modalTitle.innerHTML = 'Food Needed 🍔';
    grid.innerHTML = '<p style="color:#a0a0c0; grid-column: 1/-1; text-align: center; padding: 1rem 0;">No food needed for Level 1.</p>';
    return;
  }

  modalTitle.innerHTML = `Food Needed for level ${currentLevel} <span style="font-size: 15px; color: #a0a0c0; font-weight: 600;">(${fmtNum(totalHp)} HP)</span>`;

  foodTypes.forEach(food => {
    const requiredQty = Math.ceil(totalHp / food.hp);
    
    grid.innerHTML += `
      <div class="food-card">
        <img src="${food.img}" alt="${food.name}" class="food-img" onerror="this.src='images/icon.webp'">
        <div class="food-name">${food.name}</div>
        <div class="food-qty">${fmtNum(requiredQty)}</div>
      </div>
    `;
  });
}

function update() {
  const slime = slimes.find(s => s.name === selectedSlime);
  const sorted = [...selectedMuts].sort();
  document.getElementById('active-label').textContent = sorted.length ? sorted.join(' + ') : 'None';
  
  const resWrapper = document.getElementById('res-slime-wrapper');
  const resImg = document.getElementById('res-slime-img');
  const favBtn = document.getElementById('fav-toggle-btn');

  if (selectedMuts.has('huge')) document.body.classList.add('mutation-huge-active');
  else document.body.classList.remove('mutation-huge-active');

  if (selectedMuts.has('big')) document.body.classList.add('mutation-big-active');
  else document.body.classList.remove('mutation-big-active');

  if (selectedMuts.has('inverted')) document.body.classList.add('mutation-inverted-active');
  else document.body.classList.remove('mutation-inverted-active');

  if (selectedMuts.has('shiny')) document.body.classList.add('mutation-shiny-active');
  else document.body.classList.remove('mutation-shiny-active');

  if (!slime) {
    ['sel-slime','base-rarity','rarity-value','stat-atk','stat-hp','upgrade-cost'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.textContent = '—';
    });
    document.getElementById('stat-multi').textContent = 'x1';
    
    document.getElementById('rarity-value').style.color = '#e8e8f0';
    document.getElementById('rarity-value').style.textShadow = 'none';
    
    document.getElementById('rarity-label').textContent = 'Select a slime to begin';
    document.getElementById('rarity-label').style.color = '#5a5580';
    document.getElementById('rarity-label').style.textShadow = 'none';
    
    document.getElementById('rarity-indicator').style.background = '#4a4070';
    document.getElementById('combo-hint').style.display = 'none';
    
    resWrapper.classList.remove('has-slime');
    resImg.src = '';
    
    favBtn.style.display = 'none';
    return;
  }

  favBtn.style.display = 'flex';
  if (isCurrentFavorite()) {
    favBtn.classList.add('is-fav');
    favBtn.innerHTML = '⭐ Saved';
  } else {
    favBtn.classList.remove('is-fav');
    favBtn.innerHTML = '☆ Save';
  }

  resWrapper.classList.add('has-slime');
  resImg.src = slime.img;
  resImg.style.width = slime.imgSize;
  resImg.style.bottom = slime.imgBottom;
  resImg.onerror = () => { resWrapper.classList.remove('has-slime'); };

  document.getElementById('sel-slime').textContent = slime.name;
  document.getElementById('base-rarity').textContent = fmt(slime.base);

  let mutMult = 1, presetMatch = null;
  if (sorted.length > 0) {
    presetMatch = presets.find(p => { const ps=[...p.ids].sort(); return ps.length===sorted.length&&ps.every((v,i)=>v===sorted[i]); });
    mutMult = presetMatch ? presetMatch.mult : sorted.reduce((acc,id) => { const m=mutations.find(x=>x.id===id); return acc*(m?m.mult:1); },1);
  }
  
  const currentRarity = slime.base * mutMult;
  const finalColor = getRarityColor(currentRarity);

  document.getElementById('rarity-value').textContent = fmt(currentRarity);
  document.getElementById('rarity-value').style.color = finalColor;
  document.getElementById('rarity-value').style.textShadow = ''; 
  
  document.getElementById('rarity-label').textContent = slime.tier + (sorted.length ? ' + ' + sorted.join(' ') : '');
  document.getElementById('rarity-label').style.color = finalColor;
  document.getElementById('rarity-label').style.textShadow = ''; 
  
  document.getElementById('rarity-indicator').style.background = finalColor;

  const statKey = sorted.join('+');
  const statMult = statMultipliers[statKey] ?? 1;
  
  const atk = Math.round((slime.atk / 10) * (9 + currentLevel) * statMult);
  const hp  = Math.round((slime.hp / 10) * (9 + currentLevel) * statMult);
  
  document.getElementById('stat-atk').textContent = fmtNum(atk);
  document.getElementById('stat-hp').textContent = fmtNum(hp);
  document.getElementById('stat-multi').textContent = 'x' + statMult;

  const totalEggs = (currentLevel - 1) * currentLevel / 2;
  const totalHp = totalEggs * 100;
  
  if (totalHp === 0) {
    document.getElementById('upgrade-cost').textContent = '0 HP';
  } else {
    document.getElementById('upgrade-cost').innerHTML = `
      ${fmtNum(totalHp)} HP 
      <button class="food-trigger-btn" onclick="toggleFoodModal()">*Food</button>
    `;
  }
  
  renderFoodModal(totalHp);

  if (presetMatch) {
    document.getElementById('combo-hint').style.display = 'block';
    document.getElementById('combo-name').textContent = presetMatch.name + ' (x' + presetMatch.mult.toLocaleString() + ' multiplier)';
  } else { document.getElementById('combo-hint').style.display = 'none'; }
}

renderGrid();
renderFavorites();
</script>
</body>
</html>
